<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;0,900;1,700;1,800&family=Barlow:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Barlow',sans-serif;background:#080b09;color:#d8e8d8;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
ul{list-style:none}

/* ── TOKENS ── */
:root{
  --bg:    #080b09;
  --bg1:   #0d120d;
  --bg2:   #111611;
  --bg3:   #161d16;
  --bg4:   #1a221a;
  --bg5:   #1f281f;
  --green: #39d353;
  --green2:#2db342;
  --glow:  rgba(57,211,83,0.12);
  --amber: #f5a623;
  --red:   #e8412a;
  --blue:  #4ab8d4;
  --white: #d8e8d8;
  --muted: rgba(216,232,216,0.52);
  --faint: rgba(216,232,216,0.25);
  --b1:    rgba(57,211,83,0.13);
  --b2:    rgba(216,232,216,0.07);
}

/* ── NAV ── */
.nav{
  position:sticky;top:0;z-index:900;
  background:rgba(8,11,9,0.96);
  border-bottom:1px solid var(--b1);
  backdrop-filter:blur(16px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:52px;
}
.nav-brand{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;font-size:18px;letter-spacing:2px;
  color:var(--white);display:flex;align-items:center;gap:8px;
}
.nav-beta{
  font-family:'Space Mono',monospace;font-size:8px;
  color:var(--green);border:1px solid var(--green);
  padding:2px 5px;border-radius:2px;letter-spacing:1px;
}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-live{
  display:flex;align-items:center;gap:5px;
  font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:2px;color:var(--green);
}
.pulse{
  width:7px;height:7px;border-radius:50%;background:var(--green);
  animation:pulseAnim 2s ease-in-out infinite;
}
@keyframes pulseAnim{0%,100%{box-shadow:0 0 0 0 rgba(57,211,83,.5)}50%{box-shadow:0 0 0 5px rgba(57,211,83,0)}}
.ham{display:flex;flex-direction:column;gap:5px;cursor:pointer;padding:6px}
.ham span{display:block;width:22px;height:2px;background:var(--white);border-radius:2px}

/* ── MOBILE OVERLAY ── */
.mob{
  display:none;position:fixed;inset:0;z-index:950;
  background:rgba(6,9,6,0.98);
  flex-direction:column;align-items:center;justify-content:center;gap:30px;
}
.mob.open{display:flex}
.mob-x{position:absolute;top:18px;right:18px;font-size:26px;cursor:pointer;color:var(--muted)}
.mob a{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;
  font-size:26px;letter-spacing:3px;text-transform:uppercase;
  color:var(--white);transition:color .2s;
}
.mob a:hover{color:var(--green)}

/* ── HERO ── */
.hero{
  position:relative;min-height:88vh;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:0 20px 52px;overflow:hidden;
}
.hero-img{
  position:absolute;inset:0;z-index:0;
  background-image:url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=1400&q=80&auto=format&fit=crop');
  background-size:cover;background-position:center 30%;
}
.hero-fade{
  position:absolute;inset:0;z-index:1;
  background:linear-gradient(180deg,
    rgba(6,9,6,.25) 0%,
    rgba(6,9,6,.42) 35%,
    rgba(6,9,6,.80) 65%,
    rgba(6,9,6,.98) 100%
  );
}
.hero-body{position:relative;z-index:2}
.hero-label{
  font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--green);margin-bottom:14px;
  display:flex;align-items:center;gap:7px;
}
.hero-label::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);display:block}
.hero-h1{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:clamp(56px,14vw,90px);line-height:.9;
  text-transform:uppercase;letter-spacing:-1px;margin-bottom:20px;
}
.hero-h1 em{display:block;color:var(--green);font-style:italic;letter-spacing:-2px}
.hero-desc{
  font-size:15px;color:rgba(216,232,216,.78);
  max-width:400px;line-height:1.7;margin-bottom:30px;
}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:44px}
.btn{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:13px;letter-spacing:2px;text-transform:uppercase;
  padding:13px 30px;border-radius:3px;cursor:pointer;
  display:inline-block;transition:all .2s;border:none;
}
.btn-g{background:var(--green);color:#060906}
.btn-g:hover{background:#4ade67}
.btn-o{background:transparent;color:var(--white);border:1px solid rgba(216,232,216,.25)}
.btn-o:hover{border-color:var(--white)}
.hero-stats{display:flex;gap:24px;flex-wrap:wrap}
.stat-n{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--white)}
.stat-l{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}

/* ── DIVIDER ── */
.dv{height:1px;background:linear-gradient(90deg,transparent,var(--b1),transparent)}

/* ── CONDITIONS BAR ── */
.cond-bar{background:var(--bg1);padding:20px}
.cond-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.eyebrow{
  font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:3px;text-transform:uppercase;color:var(--green);
  display:flex;align-items:center;gap:6px;
}
.eyebrow::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);display:block;flex-shrink:0}
.live-pill{
  display:flex;align-items:center;gap:5px;
  font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;
  color:var(--green);background:var(--glow);border:1px solid rgba(57,211,83,.25);
  padding:3px 9px;border-radius:20px;
}
.cond-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--b2);border:1px solid var(--b2);
  border-radius:8px;overflow:hidden;
}
.cond-cell{
  background:var(--bg3);padding:14px 10px;
  display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;
}
.cond-icon{font-size:20px}
.cond-v{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:var(--white)}
.cond-l{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.cond-note{margin-top:8px;font-size:10px;color:var(--faint);text-align:right}

/* ── SECTIONS ── */
.sec{padding:48px 20px;border-bottom:1px solid var(--b2)}
.sec.alt{background:var(--bg1)}
.sec.dark{background:var(--bg2)}
.sec-h{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:clamp(32px,7vw,50px);text-transform:uppercase;
  letter-spacing:-.5px;line-height:.95;margin-bottom:8px;
}
.sec-h em{color:var(--green);font-style:italic}
.sec-h .am{color:var(--amber)}
.sec-s{font-size:14px;color:var(--muted);line-height:1.7;max-width:480px;margin-bottom:24px}

/* ── MODULE GRID ── */
.mod-grid{
  display:grid;grid-template-columns:1fr;
  gap:1px;background:var(--b2);border:1px solid var(--b2);
  border-radius:10px;overflow:hidden;
}
.mod{
  background:var(--bg3);padding:20px;
  border-left:3px solid transparent;
  transition:background .2s,border-color .2s;cursor:pointer;
}
.mod:hover{background:var(--bg4);border-left-color:var(--green)}
.mod-icon{font-size:22px;margin-bottom:8px}
.mod-title{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;
  font-size:16px;text-transform:uppercase;letter-spacing:.5px;
  color:var(--white);margin-bottom:5px;
}
.mod-desc{font-size:13px;color:var(--muted);line-height:1.6}
.mod-arrow{font-size:14px;color:var(--green);margin-top:6px;display:block}

/* ── REPORTS ── */
.report-list{
  display:flex;flex-direction:column;gap:1px;
  background:var(--b2);border:1px solid var(--b2);
  border-radius:10px;overflow:hidden;margin-bottom:18px;
}
.report{
  background:var(--bg3);padding:16px 18px;
  border-left:3px solid transparent;
  transition:background .2s,border-color .2s;cursor:pointer;
}
.report:hover{background:var(--bg4);border-left-color:var(--green)}
.r-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.r-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;text-transform:uppercase;letter-spacing:.5px}
.r-time{font-size:10px;color:var(--muted)}
.r-loc{font-size:11px;color:var(--green);margin-bottom:5px}
.r-text{font-size:13px;color:rgba(216,232,216,.72);line-height:1.55;margin-bottom:8px}
.r-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{
  font-size:9px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;padding:3px 7px;border-radius:2px;
  background:var(--glow);border:1px solid rgba(57,211,83,.2);color:var(--green);
}
.tag.hot{background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.25);color:var(--amber)}
.tag.vf{background:rgba(74,184,212,.1);border-color:rgba(74,184,212,.25);color:var(--blue)}

/* ── REPORT FORM ── */
.rform{
  background:var(--bg3);border:1px solid var(--b1);
  border-radius:10px;padding:20px;
  display:flex;flex-direction:column;gap:10px;
}
.rform-title{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;
  font-size:16px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;
}
.frow{display:flex;gap:8px;flex-wrap:wrap}
.fi{
  flex:1;min-width:130px;background:var(--bg4);
  border:1px solid var(--b2);border-radius:3px;
  padding:10px 13px;font-family:'Barlow',sans-serif;
  font-size:13px;color:var(--white);outline:none;
  transition:border-color .2s;
}
.fi::placeholder{color:var(--faint)}
.fi:focus{border-color:rgba(57,211,83,.4)}
.fta{
  width:100%;background:var(--bg4);border:1px solid var(--b2);
  border-radius:3px;padding:10px 13px;
  font-family:'Barlow',sans-serif;font-size:13px;
  color:var(--white);outline:none;resize:vertical;min-height:76px;
  transition:border-color .2s;
}
.fta::placeholder{color:var(--faint)}
.fta:focus{border-color:rgba(57,211,83,.4)}

/* ── SHOPS ── */
.shop{
  background:var(--bg3);border:1px solid var(--b2);
  border-radius:8px;padding:20px;margin-bottom:10px;
  border-left:3px solid var(--green);transition:background .2s;
}
.shop:hover{background:var(--bg4)}
.shop-name{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:18px;text-transform:uppercase;letter-spacing:.5px;
  color:var(--white);margin-bottom:8px;
}
.shop-detail{
  font-size:12px;color:var(--muted);
  display:flex;align-items:center;gap:6px;margin-bottom:4px;
}
.shop-detail span{color:var(--green);font-size:11px}
.shop-tags{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}
.shop-tag{
  font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:3px 7px;border-radius:2px;
  background:var(--glow);border:1px solid rgba(57,211,83,.15);color:var(--green);
}
.event-row{
  font-size:12px;color:var(--muted);
  display:flex;align-items:flex-start;gap:7px;margin-top:5px;line-height:1.5;
}
.event-row::before{content:'📅';font-size:11px;flex-shrink:0}
.event-label{
  font-family:'Space Mono',monospace;font-size:8px;
  letter-spacing:2px;text-transform:uppercase;color:var(--green);
  margin-bottom:4px;display:flex;align-items:center;gap:5px;
}
.event-label::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--green);display:block}

/* ── CATCH LOG ── */
.catch-wrap{
  background:var(--bg3);border:1px solid var(--b1);
  border-radius:10px;padding:18px;
}
.catch-empty{text-align:center;padding:28px 0;color:var(--faint);font-size:13px}
.catch-entry{
  background:var(--bg4);border:1px solid var(--b2);
  border-radius:5px;padding:12px;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:flex-start;
}
.catch-sp{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;color:var(--white)}
.catch-d{font-size:11px;color:var(--muted);margin-top:3px}
.catch-date{font-size:10px;color:var(--faint)}

/* ── DEPTH FINDER ── */
.depth-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.depth-btn{
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  padding:7px 14px;border-radius:3px;border:1px solid var(--b2);
  background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;
}
.depth-btn.on{background:var(--glow);border-color:rgba(57,211,83,.35);color:var(--green)}
.depth-card{
  background:var(--bg3);border:1px solid var(--b1);
  border-radius:10px;padding:20px;
}
.depth-name{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:22px;text-transform:uppercase;color:var(--white);margin-bottom:4px;
}
.depth-meta{font-size:11px;color:var(--muted);margin-bottom:14px}
.depth-stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;background:var(--b2);border-radius:6px;overflow:hidden;margin-bottom:12px;
}
.ds{background:var(--bg4);padding:12px 8px;text-align:center}
.ds-v{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:var(--green)}
.ds-l{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.depth-text{font-size:12px;color:var(--muted);line-height:1.65}
.depth-text strong{color:var(--white)}
.usgs-a{
  display:inline-flex;align-items:center;gap:5px;margin-top:10px;
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--green);
  transition:opacity .2s;
}
.usgs-a:hover{opacity:.7}

/* ── WEATHER DETAIL ── */
.wx-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;background:var(--b2);border:1px solid var(--b2);
  border-radius:8px;overflow:hidden;margin-bottom:14px;
}
.wx-cell{background:var(--bg3);padding:14px 12px;text-align:center}
.wx-icon{font-size:22px;margin-bottom:4px}
.wx-v{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;color:var(--white)}
.wx-l{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.wx-link{
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--green);
  display:inline-flex;align-items:center;gap:5px;
}

/* ── WHI EXPANDED ── */
.whi-hero{background:linear-gradient(135deg,rgba(57,211,83,0.07),rgba(57,211,83,0.02));border:1px solid rgba(57,211,83,0.2);border-radius:10px;padding:22px 20px;margin-bottom:14px;position:relative;overflow:hidden}
.whi-hero::before{content:'GUARDIAN';position:absolute;right:-8px;top:50%;transform:translateY(-50%);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:72px;color:rgba(57,211,83,0.04);letter-spacing:4px;pointer-events:none;white-space:nowrap}
.whi-score-row{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.whi-score{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:62px;color:var(--green);line-height:1}
.whi-score-info{display:flex;flex-direction:column;gap:4px}
.whi-score-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;text-transform:uppercase;letter-spacing:.5px;color:var(--white)}
.whi-score-sub{font-size:11px;color:var(--muted)}
.whi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--b2);border-radius:8px;overflow:hidden;margin-bottom:12px}
.whi-cell{background:var(--bg3);padding:16px 10px;text-align:center;position:relative}
.whi-v{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;color:var(--green)}
.whi-l{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.whi-range{font-size:9px;color:var(--faint);margin-top:3px}
.whi-status{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:16px}
.whi-good{background:rgba(57,211,83,.1);border:1px solid rgba(57,211,83,.3);color:var(--green)}
.whi-warn{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);color:var(--amber)}
.whi-bad{background:rgba(232,65,42,.1);border:1px solid rgba(232,65,42,.3);color:var(--red)}
/* Education cards */
.edu-grid{display:flex;flex-direction:column;gap:1px;background:var(--b2);border:1px solid var(--b2);border-radius:10px;overflow:hidden;margin-bottom:14px}
.edu-card{background:var(--bg3);padding:18px 20px;border-left:3px solid var(--green);transition:background .2s;cursor:pointer}
.edu-card:hover{background:var(--bg4)}
.edu-card.warn{border-left-color:var(--amber)}
.edu-card.bad{border-left-color:var(--red)}
.edu-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;letter-spacing:.5px;color:var(--white);margin-bottom:5px;display:flex;align-items:center;gap:8px}
.edu-desc{font-size:13px;color:var(--muted);line-height:1.65}
.edu-what{font-size:12px;color:var(--green);margin-top:6px;line-height:1.55}
.edu-card.warn .edu-what{color:var(--amber)}
.edu-card.bad .edu-what{color:var(--red)}
.edu-tag{display:inline-block;margin-top:8px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:2px;background:var(--glow);border:1px solid rgba(57,211,83,.2);color:var(--green)}
/* Guardian badges */
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.badge-card{background:var(--bg3);border:1px solid var(--b2);border-radius:8px;padding:14px 10px;text-align:center;transition:border-color .2s,transform .2s}
.badge-card:hover{border-color:var(--green);transform:translateY(-2px)}
.badge-icon{font-size:28px;margin-bottom:6px}
.badge-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--white);margin-bottom:3px}
