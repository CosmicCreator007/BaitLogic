<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BaitLogic – Depth · Connection · Community</title>

  <style>
    :root {
      --bg-dark: #050814;
      --bg-card: #0b1120;
      --bg-footer: #020617;
      --accent: #f97316;
      --accent-soft: #fbbf24;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --border-subtle: #1f2937;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      line-height: 1.5;
    }

    header {
      padding: 20px;
      text-align: center;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-subtle);
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
      color: var(--accent);
    }

    header p {
      margin: 5px 0 0;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .hero {
      padding: 60px 20px;
      text-align: center;
      background: radial-gradient(circle at 50% 100%, rgba(15,23,42,0.8), #050814);
    }

    .hero h2 {
      font-size: 2.2rem;
      margin-bottom: 10px;
      color: var(--accent-soft);
    }

    .hero p {
      max-width: 600px;
      margin: 0 auto;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .section {
      padding: 40px 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: var(--bg-card);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border-subtle);
      margin-bottom: 20px;
    }

    .card h3 {
      margin-top: 0;
      color: var(--accent);
    }

    /* MULTI-LAKE GRID */
    .lake-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 20px;
    }

      background: var(--bg-card);
      padding: 16
