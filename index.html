<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BaitLogic – Carlyle Lake Community Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg-dark: #050814;
      --bg-card: #0b1120;
      --bg-footer: #020617;
      --accent: #f97316;
      --accent-soft: #fbbf24;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --border-subtle: #1f2937;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
    }

    a { color: inherit; }

    /* NAVBAR */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      backdrop-filter: blur(12px);
      background: linear-gradient(to bottom, rgba(5,8,20,0.9), rgba(5,8,20,0.4));
      border-bottom: 1px solid rgba(148,163,184,0.25);
    }

    .nav-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .nav-logo {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 0%, #fbbf24, #f97316 45%, #7c2d12 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
    }

    .nav-title {
      font-weight: 600;
      font-size: 1rem;
    }

    .nav-links {
      display: flex;
      gap: 1rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .nav-links a {
      text-decoration: none;
      padding: 0.25rem 0.4rem;
      border-radius: 999px;
    }

    .nav-links a:hover {
      color: var(--text-main);
      background: rgba(148,163,184,0.15);
    }

    .nav-right {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      font-size: 0.9rem;
    }

    .btn-ghost {
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.4);
      background: transparent;
      color: var(--text-main);
      text-decoration: none;
    }

    .btn-ghost:hover {
      background: rgba(15,23,42,0.9);
    }

    .btn-nav-primary {
      padding: 0.45rem 1rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(to right, #f97316, #fbbf24);
      color: #111827;
      font-weight: 600;
      text-decoration: none;
    }

    .btn-nav-primary:hover {
      filter: brightness(1.05);
    }

    /* HERO */
    .hero {
      min-height: 80vh;
      padding: 6rem 1.5rem 3rem;
      background:
        linear-gradient(to bottom, rgba(15,23,42,0.1), #020617 70%),
        radial-gradient(circle at top, rgba(56,189,248,0.18), transparent 55%),
        radial-gradient(circle at bottom, rgba(249,115,22,0.25), transparent 60%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-inner {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 2.5rem;
      align-items: center;
    }

    @media (max-width: 900px) {
      .hero-inner {
        grid-template-columns: minmax(0, 1fr);
        text-align: center;
      }
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.5);
      background: rgba(15,23,42,0.8);
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.9rem;
    }

    .hero-badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34,197,94,0.25);
    }

    .hero-title {
      font-size: clamp(2.4rem, 4vw, 3.1rem);
      line-height: 1.1;
      margin: 0 0 0.75rem;
    }

    .hero-subtitle {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 32rem;
      margin-bottom: 1.5rem;
    }

    .hero-tagline {
      font-size: 0.95rem;
      color: #e5e7eb;
      margin-bottom: 1.75rem;
    }

    .hero-tagline span {
      color: var(--accent-soft);
      font-weight: 600;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 900px) {
      .hero-actions {
        justify-content: center;
      }
    }

    .btn-primary {
      padding: 0.85rem 1.8rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(to right, #f97316, #fbbf24);
      color: #111827;
      font-weight: 600;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .btn-primary:hover {
      filter: brightness(1.05);
    }

    .btn-secondary {
      padding: 0.85rem 1.4rem;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      background: rgba(15,23,42,0.9);
      color: var(--text-main);
      text-decoration: none;
      font-size: 0.95rem;
    }

    .btn-secondary:hover {
      background: rgba(15,23,42,1);
    }

    .hero-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .hero-meta strong {
      color: #e5e7eb;
    }

    .hero-visual {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-orbit {
      width: 260px;
      height: 260px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 30% 0%, #fbbf24, #f97316 45%, #7c2d12 100%);
      box-shadow:
        0 0 40px rgba(249,115,22,0.6),
        0 0 120px rgba(59,130,246,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .hero-orbit-inner {
      width: 82%;
      height: 82%;
      border-radius: 999px;
      border: 2px solid rgba(15,23,42,0.4);
      background:
        radial-gradient(circle at 50% 0%, rgba(248,250,252,0.3), transparent 55%),
        radial-gradient(circle at 50% 100%, rgba(15,23,42,0.8), #
