<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BaitLogic – Live Waters</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #0f172a; color: #e5e7eb; }
    header { padding: 1.5rem; text-align: center; background: #020617; border-bottom: 1px solid #1f2937; }
    h1 { margin: 0; font-size: 2rem; }
    main { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem 3rem; display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; }
    .panel { background: #020617; border-radius: 0.75rem; padding: 1rem; border: 1px solid #1f2937; }
    .panel h2 { margin-top: 0; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.08em; color: #9ca3af; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { margin-bottom: 0.5rem; }
    .water-item { padding: 0.5rem; border-radius: 0.5rem; cursor: pointer; }
    .water-item:hover { background: #111827; }
    .water-item.active { background: #1f2937; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .badge.green { background: rgba(22,163,74,0.15); color: #4ade80; }
    .badge.yellow { background: rgba(234,179,8,0.15); color: #facc15; }
    .badge.red { background: rgba(220,38,38,0.15); color: #f87171; }
    .section-title { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.08em; color: #9ca3af; margin-bottom: 0.5rem; }
    .stat { font-size: 0.9rem; margin-bottom: 0.25rem; }
    .stat span { color: #9ca3af; }
    .list-box { max-height: 220px; overflow-y: auto; font-size: 0.9rem; }
    .pill { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.7rem; background: #111827; color: #9ca3af; margin-right: 0.25rem; }
    .chat-input { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .chat-input input { flex: 1; padding: 0.4rem 0.5rem; border-radius: 0.4rem; border: 1px solid #374151; background: #020617; color: #e5e7eb; }
    .chat-input button { padding: 0.4rem 0.75rem; border-radius: 0.4rem; border: none; background: #2563eb; color: white; cursor: pointer; font-size: 0.85rem; }
    .chat-input button:hover { background: #1d4ed8; }
    .small { font-size: 0.8rem; color: #9ca3af; }
  </style>
</head>
<body>
  <header>
    <h1>BaitLogic</h1>
    <p class="small">Real‑time waters, health, catches, and chat. Safety and conservation first.</p>
  </header>

  <main>
    <aside class="panel">
      <h2>Waters</h2>
      <div id="waters-list">Loading waters…</div>
    </aside>

    <section class="panel">
      <div id="water-detail">
        <p>Select a water to view details.</p>
      </div>
    </section>
